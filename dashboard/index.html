<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Admin Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #030712;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated gradient orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.3;
      animation: float 8s ease-in-out infinite;
    }
    .orb-1 { width: 500px; height: 500px; background: #6366f1; top: -150px; left: -100px; animation-delay: 0s; }
    .orb-2 { width: 400px; height: 400px; background: #ec4899; bottom: -100px; right: -80px; animation-delay: 3s; }
    .orb-3 { width: 300px; height: 300px; background: #06b6d4; top: 50%; left: 60%; animation-delay: 5s; }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }

    /* Grid pattern overlay */
    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    /* Login card */
    .login-card {
      position: relative;
      z-index: 10;
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 48px 40px;
      width: 420px;
      max-width: 90vw;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.05),
        0 25px 50px -12px rgba(0, 0, 0, 0.8),
        inset 0 1px 0 rgba(255,255,255,0.05);
    }

    /* Logo */
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      box-shadow: 0 0 40px rgba(99, 102, 241, 0.4);
    }
    .logo-icon i { width: 36px; height: 36px; color: white; }
    .logo h1 {
      font-size: 24px;
      font-weight: 800;
      background: linear-gradient(135deg, #f1f5f9, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 4px;
    }
    .logo p {
      font-size: 14px;
      color: #64748b;
    }

    /* Form */
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .input-wrapper {
      position: relative;
    }
    .input-wrapper i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      color: #475569;
    }
    .form-group input {
      width: 100%;
      padding: 14px 16px 14px 48px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.3);
      color: #f1f5f9;
      font-size: 16px;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
    }
    .form-group input:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }
    .form-group input::placeholder {
      color: #475569;
    }

    /* Button */
    .btn-login {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      font-size: 16px;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 8px;
    }
    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
    }
    .btn-login:active {
      transform: translateY(0);
    }
    .btn-login i { width: 20px; height: 20px; }

    /* Error */
    .error-msg {
      color: #ef4444;
      font-size: 14px;
      text-align: center;
      margin-top: 16px;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .error-msg.show { display: flex; }
    .error-msg i { width: 16px; height: 16px; }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: #475569;
    }

    /* Loading spinner */
    .spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Mobile */
    @media (max-width: 480px) {
      .login-card { padding: 32px 24px; }
      .logo-icon { width: 60px; height: 60px; }
      .logo-icon i { width: 28px; height: 28px; }
      .logo h1 { font-size: 20px; }
    }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="grid-bg"></div>

  <div class="login-card">
    <div class="logo">
      <div class="logo-icon">
        <i data-lucide="shield"></i>
      </div>
      <h1>Admin Dashboard</h1>
      <p>@anonrpg_bot • Anonymous Chat + RPG</p>
    </div>

    <div class="form-group">
      <label>Password</label>
      <div class="input-wrapper">
        <i data-lucide="lock"></i>
        <input type="password" id="password" placeholder="Masukkan password..." autofocus>
      </div>
    </div>

    <button class="btn-login" onclick="login()">
      <span id="btn-text">Masuk</span>
      <div class="spinner" id="spinner"></div>
      <i data-lucide="arrow-right" id="btn-icon"></i>
    </button>

    <div class="error-msg" id="error">
      <i data-lucide="alert-circle"></i>
      <span>Password salah!</span>
    </div>

    <div class="footer">
      Powered by Telegraf + SQLite • RyuDEV
    </div>
  </div>

  <script>
    lucide.createIcons();

    async function login() {
      const pass = document.getElementById('password').value;
      if (!pass) return;

      const btn = document.querySelector('.btn-login');
      const btnText = document.getElementById('btn-text');
      const spinner = document.getElementById('spinner');
      const btnIcon = document.getElementById('btn-icon');

      btn.disabled = true;
      btnText.style.display = 'none';
      btnIcon.style.display = 'none';
      spinner.style.display = 'block';

      try {
        const res = await fetch('/api/stats', {
          headers: { 'Authorization': 'Basic ' + btoa('admin:' + pass) }
        });
        if (res.ok) {
          sessionStorage.setItem('auth', btoa('admin:' + pass));
          window.location.href = '/dashboard.html';
        } else {
          document.getElementById('error').classList.add('show');
          btn.disabled = false;
          btnText.style.display = 'inline';
          btnIcon.style.display = 'inline';
          spinner.style.display = 'none';
        }
      } catch (e) {
        document.getElementById('error').classList.add('show');
        btn.disabled = false;
        btnText.style.display = 'inline';
        btnIcon.style.display = 'inline';
        spinner.style.display = 'none';
      }
    }

    document.getElementById('password').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>
