<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Login — Admin Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --border: #e2e8f0;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --accent: #a78bfa;
      --accent-dark: #7c3aed;
      --yellow: #facc15;
      --green: #4ade80;
      --red: #f87171;
      --blue: #60a5fa;
      --pink: #f472b6;
      --shadow: 4px 4px 0px #000;
      --shadow-sm: 2px 2px 0px #000;
      --shadow-lg: 6px 6px 0px #000;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      border: 4px solid var(--border);
    }

    .login-card {
      background: var(--surface);
      border: 3px solid var(--border);
      border-radius: 0;
      padding: 0;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow-lg);
    }

    .card-top {
      background: var(--accent-dark);
      border-bottom: 3px solid var(--border);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .card-top-icon {
      width: 48px;
      height: 48px;
      background: var(--yellow);
      border: 3px solid var(--border);
      border-radius: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-sm);
      flex-shrink: 0;
    }
    .card-top-icon i { width: 24px; height: 24px; color: #000; }
    .card-top h1 { font-size: 22px; font-weight: 700; color: #fff; }
    .card-top p { font-size: 13px; color: rgba(255,255,255,0.7); }

    .card-body { padding: 24px; }

    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .input-wrap {
      position: relative;
    }
    .input-wrap i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      color: var(--muted);
    }
    .form-group input {
      width: 100%;
      padding: 14px 14px 14px 44px;
      border: 3px solid var(--border);
      border-radius: 0;
      background: var(--bg);
      color: var(--text);
      font-size: 16px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 500;
      box-shadow: var(--shadow-sm);
      transition: all 0.1s;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
      transform: translate(2px, 2px);
      box-shadow: none;
    }
    .form-group input::placeholder { color: #475569; }

    .btn-login {
      width: 100%;
      padding: 14px;
      border: 3px solid var(--border);
      border-radius: 0;
      background: var(--yellow);
      color: #000;
      font-size: 16px;
      font-weight: 700;
      font-family: 'Space Grotesk', sans-serif;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: all 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .btn-login:hover {
      transform: translate(2px, 2px);
      box-shadow: var(--shadow-sm);
    }
    .btn-login:active {
      transform: translate(4px, 4px);
      box-shadow: none;
    }
    .btn-login i { width: 18px; height: 18px; }

    .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 3px solid rgba(0,0,0,0.2);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.5s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: var(--red);
      border: 3px solid var(--border);
      box-shadow: var(--shadow-sm);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      margin-top: 16px;
    }
    .error-msg.show { display: flex; }
    .error-msg i { width: 18px; height: 18px; }

    .footer {
      text-align: center;
      padding: 16px 24px;
      border-top: 3px solid var(--border);
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
    }

    /* Mobile */
    @media (max-width: 480px) {
      body { padding: 8px; border-width: 2px; }
      .card-top { padding: 16px; }
      .card-top-icon { width: 40px; height: 40px; }
      .card-top-icon i { width: 20px; height: 20px; }
      .card-top h1 { font-size: 18px; }
      .card-body { padding: 16px; }
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="card-top">
      <div class="card-top-icon">
        <i data-lucide="shield"></i>
      </div>
      <div>
        <h1>Admin Dashboard</h1>
        <p>@anonrpg_bot • Anonymous Chat + RPG</p>
      </div>
    </div>

    <div class="card-body">
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <i data-lucide="lock"></i>
          <input type="password" id="password" placeholder="Masukkan password..." autofocus>
        </div>
      </div>

      <button class="btn-login" onclick="login()">
        <span id="btn-text">MASUK</span>
        <div class="spinner" id="spinner"></div>
        <i data-lucide="arrow-right" id="btn-icon"></i>
      </button>

      <div class="error-msg" id="error">
        <i data-lucide="alert-circle"></i>
        <span>Password salah!</span>
      </div>
    </div>

    <div class="footer">Powered by Telegraf + SQLite • RyuDEV</div>
  </div>

  <script>
    lucide.createIcons();

    async function login() {
      const pass = document.getElementById('password').value;
      if (!pass) return;

      const btnText = document.getElementById('btn-text');
      const spinner = document.getElementById('spinner');
      const btnIcon = document.getElementById('btn-icon');

      btnText.style.display = 'none';
      btnIcon.style.display = 'none';
      spinner.style.display = 'block';

      try {
        const res = await fetch('/api/stats', {
          headers: { 'Authorization': 'Basic ' + btoa('admin:' + pass) }
        });
        if (res.ok) {
          sessionStorage.setItem('auth', btoa('admin:' + pass));
          window.location.href = '/dashboard.html';
        } else {
          document.getElementById('error').classList.add('show');
          btnText.style.display = 'inline';
          btnIcon.style.display = 'inline';
          spinner.style.display = 'none';
        }
      } catch (e) {
        document.getElementById('error').classList.add('show');
        btnText.style.display = 'inline';
        btnIcon.style.display = 'inline';
        spinner.style.display = 'none';
      }
    }

    document.getElementById('password').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>
