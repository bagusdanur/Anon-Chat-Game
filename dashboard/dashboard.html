<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Anon Chat Bot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }
    .header {
      background: #1e293b;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #334155;
    }
    .header h1 { font-size: 20px; }
    .header button {
      background: #ef4444;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid #334155;
    }
    .stat-card .label { color: #94a3b8; font-size: 14px; }
    .stat-card .value { font-size: 32px; font-weight: 700; margin-top: 4px; }
    .stat-card .value.green { color: #22c55e; }
    .stat-card .value.blue { color: #3b82f6; }
    .stat-card .value.yellow { color: #eab308; }
    .stat-card .value.red { color: #ef4444; }
    .section {
      background: #1e293b;
      border-radius: 12px;
      border: 1px solid #334155;
      padding: 20px;
      margin-bottom: 24px;
    }
    .section h2 { margin-bottom: 16px; font-size: 18px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #334155; }
    th { color: #94a3b8; font-size: 13px; text-transform: uppercase; }
    tr:hover { background: #334155; }
    .badge {
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-green { background: #052e16; color: #22c55e; }
    .badge-red { background: #450a0a; color: #ef4444; }
    .badge-blue { background: #172554; color: #3b82f6; }
    .badge-yellow { background: #422006; color: #eab308; }
    .btn-sm {
      padding: 4px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    .btn-ban { background: #ef4444; color: white; }
    .btn-unban { background: #22c55e; color: white; }
    .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .tab {
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      background: #334155;
      border: none;
      color: #e2e8f0;
    }
    .tab.active { background: #6366f1; }
    .word-filter-box {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .word-filter-box input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #334155;
      border-radius: 8px;
      background: #0f172a;
      color: #e2e8f0;
    }
    .word-filter-box button {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      background: #6366f1;
      color: white;
      cursor: pointer;
    }
    .word-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .word-tag {
      background: #334155;
      padding: 4px 12px;
      border-radius: 16px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .word-tag .remove {
      cursor: pointer;
      color: #ef4444;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🎭 Admin Dashboard — @anonrpg_bot</h1>
    <button onclick="logout()">Logout</button>
  </div>
  <div class="container">
    <div class="stats" id="stats"></div>
    <div class="tabs">
      <button class="tab active" onclick="showTab('users', this)">👥 Users</button>
      <button class="tab" onclick="showTab('rpg', this)">⚔️ RPG Players</button>
      <button class="tab" onclick="showTab('reports', this)">🚨 Reports</button>
      <button class="tab" onclick="showTab('wordfilter', this)">🛡️ Word Filter</button>
    </div>
    <div class="section" id="content"></div>
  </div>

  <script>
    const auth = sessionStorage.getItem('auth');
    if (!auth) window.location.href = '/';

    const headers = { 'Authorization': 'Basic ' + auth, 'Content-Type': 'application/json' };

    // Load Stats
    async function loadStats() {
      const res = await fetch('/api/stats', { headers });
      const s = await res.json();
      document.getElementById('stats').innerHTML = `
        <div class="stat-card"><div class="label">Total Users</div><div class="value blue">${s.totalUsers}</div></div>
        <div class="stat-card"><div class="label">Online</div><div class="value green">${s.onlineUsers}</div></div>
        <div class="stat-card"><div class="label">Paired</div><div class="value yellow">${s.pairedUsers}</div></div>
        <div class="stat-card"><div class="label">In Queue</div><div class="value">${s.queuedUsers}</div></div>
        <div class="stat-card"><div class="label">Banned</div><div class="value red">${s.bannedUsers}</div></div>
        <div class="stat-card"><div class="label">Reports (24h)</div><div class="value yellow">${s.reports24h}</div></div>
        <div class="stat-card"><div class="label">RPG Players</div><div class="value blue">${s.rpgUsers}</div></div>
      `;
    }

    // Load Users
    async function loadUsers() {
      const res = await fetch('/api/users', { headers });
      const users = await res.json();
      let html = '<h2>👥 Users</h2><table><tr><th>Chat ID</th><th>Status</th><th>Lang</th><th>Gender</th><th>Banned</th><th>Joined</th><th>Action</th></tr>';
      users.forEach(u => {
        const statusBadge = u.status === 'chatting' ? 'badge-green' : u.status === 'queued' ? 'badge-yellow' : 'badge-blue';
        html += `<tr>
          <td><code>${u.chat_id}</code></td>
          <td><span class="badge ${statusBadge}">${u.status}</span></td>
          <td>${u.lang || 'any'}</td>
          <td>${u.gender || 'any'}</td>
          <td>${u.is_banned ? '<span class="badge badge-red">BANNED</span>' : '-'}</td>
          <td>${u.created_at || '-'}</td>
          <td>${u.is_banned
            ? `<button class="btn-sm btn-unban" onclick="unban('${u.chat_id}')">Unban</button>`
            : `<button class="btn-sm btn-ban" onclick="ban('${u.chat_id}')">Ban</button>`
          }</td>
        </tr>`;
      });
      html += '</table>';
      document.getElementById('content').innerHTML = html;
    }

    // Load RPG Players
    async function loadRPG() {
      const res = await fetch('/api/rpg-users', { headers });
      const users = await res.json();
      let html = '<h2>⚔️ RPG Players</h2><table><tr><th>User ID</th><th>Class</th><th>Level</th><th>XP</th><th>Gold</th><th>HP</th></tr>';
      users.forEach(u => {
        const cls = u.class_name === 'ksatria' ? '⚔️' : u.class_name === 'penyihir' ? '🔥' : '🗡️';
        html += `<tr>
          <td><code>${u.telegram_user_id}</code></td>
          <td>${cls} ${u.class_name}</td>
          <td>Lv.${u.level}</td>
          <td>${u.xp}</td>
          <td>${u.gold}g</td>
          <td>${u.hp}/${u.max_hp}</td>
        </tr>`;
      });
      html += '</table>';
      document.getElementById('content').innerHTML = html;
    }

    // Load Reports
    async function loadReports() {
      const res = await fetch('/api/reports', { headers });
      const reports = await res.json();
      let html = '<h2>🚨 Reports</h2>';
      if (reports.length === 0) {
        html += '<p style="color: #94a3b8;">Tidak ada laporan.</p>';
      } else {
        html += '<table><tr><th>Reporter</th><th>Reported</th><th>Reason</th><th>Date</th></tr>';
        reports.forEach(r => {
          html += `<tr>
            <td><code>${r.reporter_id}</code></td>
            <td><code>${r.reported_id}</code></td>
            <td>${r.reason || '-'}</td>
            <td>${r.created_at}</td>
          </tr>`;
        });
        html += '</table>';
      }
      document.getElementById('content').innerHTML = html;
    }

    // Load Word Filter
    let currentWords = [];
    async function loadWordFilter() {
      const res = await fetch('/api/wordfilter', { headers });
      const data = await res.json();
      currentWords = data.words;
      renderWordFilter();
    }

    function renderWordFilter() {
      let html = '<h2>🛡️ Word Filter</h2>';
      html += '<div class="word-filter-box"><input type="text" id="newWord" placeholder="Tambah kata baru..."><button onclick="addWord()">Tambah</button></div>';
      html += '<div class="word-tags">';
      currentWords.forEach((w, i) => {
        html += `<span class="word-tag">${w} <span class="remove" onclick="removeWord(${i})">×</span></span>`;
      });
      html += '</div>';
      document.getElementById('content').innerHTML = html;
    }

    function addWord() {
      const input = document.getElementById('newWord');
      const word = input.value.trim();
      if (word && !currentWords.includes(word)) {
        currentWords.push(word);
        saveWordFilter();
        input.value = '';
      }
    }

    function removeWord(index) {
      currentWords.splice(index, 1);
      saveWordFilter();
    }

    async function saveWordFilter() {
      await fetch('/api/wordfilter', {
        method: 'POST',
        headers,
        body: JSON.stringify({ words: currentWords })
      });
      renderWordFilter();
    }

    // Ban/Unban
    async function ban(id) {
      await fetch(`/api/users/${id}/ban`, { method: 'POST', headers });
      loadUsers();
      loadStats();
    }

    async function unban(id) {
      await fetch(`/api/users/${id}/unban`, { method: 'POST', headers });
      loadUsers();
      loadStats();
    }

    // Tab Switching
    function showTab(tab, el) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      if (tab === 'users') loadUsers();
      else if (tab === 'rpg') loadRPG();
      else if (tab === 'reports') loadReports();
      else if (tab === 'wordfilter') loadWordFilter();
    }

    // Logout
    function logout() {
      sessionStorage.removeItem('auth');
      window.location.href = '/';
    }

    // Init
    loadStats();
    loadUsers();
  </script>
</body>
</html>
