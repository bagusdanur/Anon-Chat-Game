<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dashboard — Anon Chat Bot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --border: #e2e8f0;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --accent: #a78bfa;
      --accent-dark: #7c3aed;
      --yellow: #facc15;
      --green: #4ade80;
      --red: #f87171;
      --blue: #60a5fa;
      --pink: #f472b6;
      --cyan: #22d3ee;
      --orange: #fb923c;
      --shadow: 4px 4px 0px #000;
      --shadow-sm: 2px 2px 0px #000;
      --shadow-lg: 6px 6px 0px #000;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      border: 3px solid var(--border);
    }

    /* ===== HEADER ===== */
    .header {
      background: var(--surface);
      border-bottom: 3px solid var(--border);
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .hamburger {
      display: none;
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-sm);
    }
    .hamburger i { width: 20px; height: 20px; }
    .header-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-icon {
      width: 36px;
      height: 36px;
      background: var(--yellow);
      border: 3px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-sm);
    }
    .header-icon i { width: 18px; height: 18px; color: #000; }
    .header h1 { font-size: 16px; font-weight: 700; }
    .header-btn {
      padding: 8px 14px;
      border: 3px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      font-family: 'Space Grotesk', sans-serif;
      box-shadow: var(--shadow-sm);
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.1s;
    }
    .header-btn:hover {
      transform: translate(2px, 2px);
      box-shadow: none;
    }
    .header-btn i { width: 16px; height: 16px; }
    .header-btn.danger { background: var(--red); color: #000; }

    /* ===== LAYOUT ===== */
    .layout {
      display: flex;
      min-height: calc(100vh - 57px);
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: 220px;
      background: var(--surface);
      border-right: 3px solid var(--border);
      padding: 16px 0;
      flex-shrink: 0;
    }
    .nav-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 0 16px;
      margin: 16px 0 8px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: var(--muted);
      transition: all 0.1s;
      border-left: 3px solid transparent;
    }
    .nav-item:hover {
      background: rgba(255,255,255,0.05);
      color: var(--text);
    }
    .nav-item.active {
      background: rgba(167, 139, 250, 0.1);
      color: var(--accent);
      border-left-color: var(--accent);
    }
    .nav-item i { width: 18px; height: 18px; flex-shrink: 0; }
    .nav-badge {
      margin-left: auto;
      background: var(--red);
      color: #000;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border: 2px solid var(--border);
    }

    /* ===== MAIN ===== */
    .main {
      flex: 1;
      padding: 16px;
      overflow-x: hidden;
    }

    /* ===== STATS GRID ===== */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }
    .stat-card {
      background: var(--surface);
      border: 3px solid var(--border);
      padding: 16px;
      box-shadow: var(--shadow);
      transition: all 0.1s;
      position: relative;
      overflow: hidden;
    }
    .stat-card:hover {
      transform: translate(2px, 2px);
      box-shadow: var(--shadow-sm);
    }
    .stat-card .accent-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
    }
    .stat-card .stat-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }
    .stat-card .stat-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .stat-card .stat-icon {
      width: 32px;
      height: 32px;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .stat-card .stat-icon i { width: 16px; height: 16px; }
    .stat-card .stat-value {
      font-size: 28px;
      font-weight: 700;
    }

    /* ===== CONTENT CARD ===== */
    .card {
      background: var(--surface);
      border: 3px solid var(--border);
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 3px solid var(--border);
      flex-wrap: wrap;
      gap: 8px;
    }
    .card-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      font-weight: 700;
    }
    .card-title i { width: 18px; height: 18px; color: var(--accent); }

    /* ===== TABS ===== */
    .tab-bar {
      display: flex;
      gap: 4px;
      padding: 6px;
      background: var(--bg);
      border: 3px solid var(--border);
      margin-bottom: 16px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .tab-btn {
      padding: 10px 14px;
      border: 2px solid transparent;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      font-family: 'Space Grotesk', sans-serif;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      transition: all 0.1s;
    }
    .tab-btn:hover { color: var(--text); background: rgba(255,255,255,0.05); }
    .tab-btn.active {
      background: var(--accent-dark);
      color: #fff;
      border-color: var(--border);
      box-shadow: var(--shadow-sm);
    }
    .tab-btn i { width: 16px; height: 16px; }

    /* ===== TABLE ===== */
    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    table { width: 100%; border-collapse: collapse; min-width: 600px; }
    th {
      padding: 10px 14px;
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      background: var(--bg);
      border-bottom: 3px solid var(--border);
    }
    td {
      padding: 12px 14px;
      font-size: 13px;
      border-bottom: 2px solid var(--border);
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    /* ===== BADGES ===== */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      font-size: 12px;
      font-weight: 700;
      border: 2px solid var(--border);
      box-shadow: var(--shadow-sm);
    }
    .badge i { width: 12px; height: 12px; }
    .badge-green { background: var(--green); color: #000; }
    .badge-red { background: var(--red); color: #000; }
    .badge-blue { background: var(--blue); color: #000; }
    .badge-yellow { background: var(--yellow); color: #000; }
    .badge-accent { background: var(--accent); color: #000; }
    .badge-gray { background: #475569; color: #fff; }

    /* ===== BUTTONS ===== */
    .btn {
      padding: 6px 12px;
      border: 2px solid var(--border);
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      font-family: 'Space Grotesk', sans-serif;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      box-shadow: var(--shadow-sm);
      transition: all 0.1s;
    }
    .btn:hover {
      transform: translate(1px, 1px);
      box-shadow: none;
    }
    .btn i { width: 14px; height: 14px; }
    .btn-danger { background: var(--red); color: #000; }
    .btn-success { background: var(--green); color: #000; }
    .btn-accent { background: var(--accent); color: #000; }
    .btn-outline { background: var(--surface); color: var(--text); }

    /* ===== WORD FILTER ===== */
    .filter-row {
      display: flex;
      gap: 8px;
      padding: 14px 16px;
      border-bottom: 3px solid var(--border);
    }
    .filter-input {
      flex: 1;
      padding: 10px 14px;
      border: 3px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 500;
      box-shadow: var(--shadow-sm);
    }
    .filter-input:focus {
      outline: none;
      border-color: var(--accent);
      transform: translate(2px, 2px);
      box-shadow: none;
    }
    .filter-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 14px 16px;
    }
    .filter-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: var(--bg);
      border: 2px solid var(--border);
      font-size: 13px;
      font-weight: 700;
      box-shadow: var(--shadow-sm);
    }
    .filter-tag-remove {
      cursor: pointer;
      color: var(--red);
      font-weight: 700;
    }

    /* ===== EMPTY STATE ===== */
    .empty {
      padding: 40px 20px;
      text-align: center;
      color: var(--muted);
    }
    .empty i { width: 40px; height: 40px; margin-bottom: 8px; opacity: 0.3; }
    .empty p { font-size: 14px; font-weight: 500; }

    /* ===== MOBILE SIDEBAR OVERLAY ===== */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 40;
    }
    .sidebar-overlay.show { display: block; }

    /* ===== MOBILE ===== */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        z-index: 45;
        transform: translateX(-100%);
        transition: transform 0.2s;
        width: 240px;
        border-right: 3px solid var(--border);
      }
      .sidebar.open { transform: translateX(0); }
      .hamburger { display: flex; }
      .main { padding: 12px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .stat-card { padding: 12px; }
      .stat-card .stat-value { font-size: 22px; }
      .header h1 { font-size: 14px; }
      .header-btn span { display: none; }
      table { min-width: 500px; }
    }

    @media (max-width: 400px) {
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .stat-card { padding: 10px; }
      .stat-card .stat-value { font-size: 20px; }
      .tab-btn { padding: 8px 10px; font-size: 12px; }
      .card-header { padding: 12px; }
    }
  </style>
</head>
<body>
  <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <button class="hamburger" onclick="toggleSidebar()">
        <i data-lucide="menu"></i>
      </button>
      <div class="header-brand">
        <div class="header-icon"><i data-lucide="shield"></i></div>
        <h1>Anon Chat Bot</h1>
      </div>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="header-btn" onclick="loadAll()"><i data-lucide="refresh-cw"></i><span>Refresh</span></button>
      <button class="header-btn danger" onclick="logout()"><i data-lucide="log-out"></i><span>Logout</span></button>
    </div>
  </header>

  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="nav-label">Overview</div>
      <div class="nav-item active" onclick="switchPage('home', this)">
        <i data-lucide="layout-dashboard"></i> Dashboard
      </div>

      <div class="nav-label">Management</div>
      <div class="nav-item" onclick="switchPage('users', this)">
        <i data-lucide="users"></i> Users
        <span class="nav-badge" id="nav-count">-</span>
      </div>
      <div class="nav-item" onclick="switchPage('rpg', this)">
        <i data-lucide="swords"></i> RPG Players
      </div>
      <div class="nav-item" onclick="switchPage('reports', this)">
        <i data-lucide="flag"></i> Reports
      </div>

      <div class="nav-label">Moderation</div>
      <div class="nav-item" onclick="switchPage('wordfilter', this)">
        <i data-lucide="shield-ban"></i> Word Filter
      </div>
    </aside>

    <!-- Main -->
    <main class="main" id="main-content"></main>
  </div>

  <script>
    const auth = sessionStorage.getItem('auth');
    if (!auth) window.location.href = '/';
    const H = { 'Authorization': 'Basic ' + auth, 'Content-Type': 'application/json' };

    let S = {};

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('overlay').classList.toggle('show');
    }

    async function loadAll() {
      const r = await fetch('/api/stats', { headers: H });
      S = await r.json();
      document.getElementById('nav-count').textContent = S.totalUsers;
      const active = document.querySelector('.nav-item.active');
      const page = active?.textContent?.trim().toLowerCase().replace(/\s/g, '') || 'home';
      renderPage(page === 'dashboard' ? 'home' : page);
    }

    function switchPage(p, el) {
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      if (el) el.classList.add('active');
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('overlay').classList.remove('show');
      renderPage(p);
    }

    function renderPage(p) {
      const titles = { home: 'Dashboard', users: 'Users', rpg: 'RPG Players', reports: 'Reports', wordfilter: 'Word Filter' };
      if (p === 'home') renderHome();
      else if (p === 'users') renderUsers();
      else if (p === 'rpg') renderRPG();
      else if (p === 'reports') renderReports();
      else if (p === 'wordfilter') renderWordFilter();
    }

    // ===== HOME =====
    function renderHome() {
      document.getElementById('main-content').innerHTML = `
        <div class="stats-grid">
          <div class="stat-card"><div class="accent-bar" style="background:var(--blue)"></div><div class="stat-top"><div class="stat-label">Total Users</div><div class="stat-icon" style="background:var(--blue);color:#000"><i data-lucide="users"></i></div></div><div class="stat-value">${S.totalUsers}</div></div>
          <div class="stat-card"><div class="accent-bar" style="background:var(--green)"></div><div class="stat-top"><div class="stat-label">Online</div><div class="stat-icon" style="background:var(--green);color:#000"><i data-lucide="wifi"></i></div></div><div class="stat-value">${S.onlineUsers}</div></div>
          <div class="stat-card"><div class="accent-bar" style="background:var(--yellow)"></div><div class="stat-top"><div class="stat-label">Paired</div><div class="stat-icon" style="background:var(--yellow);color:#000"><i data-lucide="heart"></i></div></div><div class="stat-value">${S.pairedUsers}</div></div>
          <div class="stat-card"><div class="accent-bar" style="background:var(--cyan)"></div><div class="stat-top"><div class="stat-label">In Queue</div><div class="stat-icon" style="background:var(--cyan);color:#000"><i data-lucide="clock"></i></div></div><div class="stat-value">${S.queuedUsers}</div></div>
          <div class="stat-card"><div class="accent-bar" style="background:var(--red)"></div><div class="stat-top"><div class="stat-label">Banned</div><div class="stat-icon" style="background:var(--red);color:#000"><i data-lucide="ban"></i></div></div><div class="stat-value">${S.bannedUsers}</div></div>
          <div class="stat-card"><div class="accent-bar" style="background:var(--pink)"></div><div class="stat-top"><div class="stat-label">Reports 24h</div><div class="stat-icon" style="background:var(--pink);color:#000"><i data-lucide="flag"></i></div></div><div class="stat-value">${S.reports24h}</div></div>
          <div class="stat-card"><div class="accent-bar" style="background:var(--accent)"></div><div class="stat-top"><div class="stat-label">RPG Players</div><div class="stat-icon" style="background:var(--accent);color:#000"><i data-lucide="swords"></i></div></div><div class="stat-value">${S.rpgUsers}</div></div>
        </div>
        <div class="card">
          <div class="card-header"><div class="card-title"><i data-lucide="zap"></i> Quick Actions</div></div>
          <div style="padding:16px;display:flex;gap:8px;flex-wrap:wrap;">
            <button class="btn btn-outline" onclick="switchPage('users',document.querySelectorAll('.nav-item')[1])"><i data-lucide="users"></i> Users</button>
            <button class="btn btn-outline" onclick="switchPage('reports',document.querySelectorAll('.nav-item')[3])"><i data-lucide="flag"></i> Reports</button>
            <button class="btn btn-outline" onclick="switchPage('wordfilter',document.querySelectorAll('.nav-item')[4])"><i data-lucide="shield-ban"></i> Word Filter</button>
          </div>
        </div>`;
      lucide.createIcons();
    }

    // ===== USERS =====
    async function renderUsers() {
      const r = await fetch('/api/users', { headers: H });
      const users = await r.json();
      let rows = users.map(u => {
        const sb = u.status === 'chatting' ? 'badge-green' : u.status === 'queued' ? 'badge-yellow' : 'badge-gray';
        const si = u.status === 'chatting' ? 'heart' : u.status === 'queued' ? 'clock' : 'user';
        return `<tr>
          <td><code style="color:var(--accent)">${u.chat_id}</code></td>
          <td><span class="badge ${sb}"><i data-lucide="${si}"></i> ${u.status}</span></td>
          <td>${u.lang||'any'}</td>
          <td>${u.gender||'-'}</td>
          <td>${u.is_banned?'<span class="badge badge-red"><i data-lucide="ban"></i> Banned</span>':'<span class="badge badge-gray">OK</span>'}</td>
          <td>${u.created_at||'-'}</td>
          <td>${u.is_banned?`<button class="btn btn-success" onclick="unban('${u.chat_id}')"><i data-lucide="check"></i> Unban</button>`:`<button class="btn btn-danger" onclick="banU('${u.chat_id}')"><i data-lucide="ban"></i> Ban</button>`}</td>
        </tr>`;
      }).join('');
      document.getElementById('main-content').innerHTML = `
        <div class="card">
          <div class="card-header"><div class="card-title"><i data-lucide="users"></i> Users (${users.length})</div><button class="btn btn-outline" onclick="renderUsers()"><i data-lucide="refresh-cw"></i> Refresh</button></div>
          <div class="table-wrap"><table><thead><tr><th>Chat ID</th><th>Status</th><th>Lang</th><th>Gender</th><th>Ban</th><th>Joined</th><th>Action</th></tr></thead><tbody>${rows}</tbody></table></div>
        </div>`;
      lucide.createIcons();
    }

    async function banU(id) { await fetch(`/api/users/${id}/ban`,{method:'POST',headers:H}); loadAll(); renderUsers(); }
    async function unban(id) { await fetch(`/api/users/${id}/unban`,{method:'POST',headers:H}); loadAll(); renderUsers(); }

    // ===== RPG =====
    async function renderRPG() {
      const r = await fetch('/api/rpg-users', { headers: H });
      const users = await r.json();
      const ci = c => c==='ksatria'?'⚔️':c==='penyihir'?'🔥':'🗡️';
      const cb = c => c==='ksatria'?'badge-blue':c==='penyihir'?'badge-accent':'badge-yellow';
      let rows = users.map(u => `<tr>
        <td><code style="color:var(--accent)">${u.telegram_user_id}</code></td>
        <td><span class="badge ${cb(u.class_name)}">${ci(u.class_name)} ${u.class_name}</span></td>
        <td><strong>Lv.${u.level}</strong></td><td>${u.xp}</td><td>💰${u.gold}g</td><td>❤️${u.hp}/${u.max_hp}</td>
      </tr>`).join('');
      document.getElementById('main-content').innerHTML = `
        <div class="card">
          <div class="card-header"><div class="card-title"><i data-lucide="swords"></i> RPG Players (${users.length})</div><button class="btn btn-outline" onclick="renderRPG()"><i data-lucide="refresh-cw"></i> Refresh</button></div>
          <div class="table-wrap"><table><thead><tr><th>User ID</th><th>Class</th><th>Level</th><th>XP</th><th>Gold</th><th>HP</th></tr></thead><tbody>${rows}</tbody></table></div>
        </div>`;
      lucide.createIcons();
    }

    // ===== REPORTS =====
    async function renderReports() {
      const r = await fetch('/api/reports', { headers: H });
      const reports = await r.json();
      const content = reports.length === 0
        ? `<div class="empty"><i data-lucide="check-circle"></i><p>No reports. All good! 🎉</p></div>`
        : `<div class="table-wrap"><table><thead><tr><th>Reporter</th><th>Reported</th><th>Reason</th><th>Date</th></tr></thead><tbody>${reports.map(r=>`<tr><td><code style="color:var(--accent)">${r.reporter_id}</code></td><td><code style="color:var(--red)">${r.reported_id}</code></td><td>${r.reason||'-'}</td><td>${r.created_at}</td></tr>`).join('')}</tbody></table></div>`;
      document.getElementById('main-content').innerHTML = `
        <div class="card">
          <div class="card-header"><div class="card-title"><i data-lucide="flag"></i> Reports (${reports.length})</div><button class="btn btn-outline" onclick="renderReports()"><i data-lucide="refresh-cw"></i> Refresh</button></div>
          ${content}
        </div>`;
      lucide.createIcons();
    }

    // ===== WORD FILTER =====
    let CW = [];
    async function renderWordFilter() {
      const r = await fetch('/api/wordfilter', { headers: H });
      const d = await r.json();
      CW = d.words;
      drawWF();
    }
    function drawWF() {
      const tags = CW.length > 0
        ? CW.map((w,i)=>`<span class="filter-tag">${w} <span class="filter-tag-remove" onclick="rmWord(${i})">×</span></span>`).join('')
        : '<p style="color:var(--muted);font-size:14px;">No blocked words.</p>';
      document.getElementById('main-content').innerHTML = `
        <div class="card">
          <div class="card-header"><div class="card-title"><i data-lucide="shield-ban"></i> Blocked Words (${CW.length})</div></div>
          <div class="filter-row">
            <input class="filter-input" id="newWord" placeholder="Add blocked word..." onkeypress="if(event.key==='Enter')addWord()">
            <button class="btn btn-accent" onclick="addWord()"><i data-lucide="plus"></i> Add</button>
          </div>
          <div class="filter-tags">${tags}</div>
        </div>`;
      lucide.createIcons();
    }
    function addWord() {
      const i = document.getElementById('newWord');
      const w = i.value.trim().toLowerCase();
      if (w && !CW.includes(w)) { CW.push(w); saveWF(); i.value = ''; }
    }
    function rmWord(i) { CW.splice(i,1); saveWF(); }
    async function saveWF() {
      await fetch('/api/wordfilter',{method:'POST',headers:H,body:JSON.stringify({words:CW})});
      drawWF();
    }

    function logout() { sessionStorage.removeItem('auth'); window.location.href = '/'; }

    // Init
    loadAll().then(() => renderHome());
  </script>
</body>
</html>
